name: Deploy production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release candidate
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      VITE_SUPABASE_URL: http://127.0.0.1:54321
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      VITE_BASE_PATH: /sentient-campaign-manager/
      E2E_REAL_BACKEND: 'true'
      DEPLOY_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Require the protected main branch
        run: test "$DEPLOY_BRANCH" = "main"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run application verification suite
        run: npm run verify

      - name: Start local Supabase
        run: npm run supabase:start

      - name: Load local Supabase public configuration
        shell: bash
        run: |
          local_status="$(npx --no-install supabase status -o json)"
          api_url="$(jq -r '.API_URL // .api_url // empty' <<<"$local_status")"
          publishable_key="$(jq -r '.PUBLISHABLE_KEY // .ANON_KEY // .publishable_key // empty' <<<"$local_status")"
          test -n "$api_url"
          test -n "$publishable_key"
          echo "VITE_SUPABASE_URL=$api_url" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=$publishable_key" >> "$GITHUB_ENV"

      - name: Rebuild and test the local database
        run: npm run supabase:reset && npm run test:db

      - name: Test every Edge Function module graph
        run: npm run test:functions

      - name: Build the release candidate against local Supabase
        run: npm run build

      - name: Install Playwright browser
        run: npx --no-install playwright install --with-deps chromium

      - name: Run the role-based local Supabase journey
        run: npm run test:e2e

  deploy-supabase:
    name: Deploy Supabase
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: github-pages
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      OUTBOX_PROCESSOR_SECRET: ${{ secrets.OUTBOX_PROCESSOR_SECRET }}
      PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment configuration
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_URL"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$OUTBOX_PROCESSOR_SECRET"
          test -n "$PUBLIC_APP_URL"
          test -n "$VITE_BASE_PATH"
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY"
          case "$VITE_SUPABASE_URL" in
            "https://$SUPABASE_PROJECT_ID.supabase.co") ;;
            *) echo "VITE_SUPABASE_URL does not match SUPABASE_PROJECT_ID" >&2; exit 1 ;;
          esac
          node <<'NODE'
          const publicUrl = new URL(process.env.PUBLIC_APP_URL);
          const trimmed = process.env.VITE_BASE_PATH.replace(/^\/+|\/+$/g, '');
          const expectedPath = trimmed ? `/${trimmed}/` : '/';
          if (publicUrl.protocol !== 'https:' || publicUrl.search || publicUrl.hash) {
            throw new Error('PUBLIC_APP_URL must be a clean HTTPS URL.');
          }
          if (publicUrl.pathname !== expectedPath) {
            throw new Error(
              `PUBLIC_APP_URL path ${publicUrl.pathname} does not match VITE_BASE_PATH ${expectedPath}.`,
            );
          }
          NODE

      - name: Link Supabase project
        run: >-
          npx --no-install supabase link
          --project-ref "$SUPABASE_PROJECT_ID"
          --password "$SUPABASE_DB_PASSWORD"

      - name: Preview database migrations
        run: >-
          npx --no-install supabase db push
          --linked
          --include-all
          --dry-run
          --password "$SUPABASE_DB_PASSWORD"

      - name: Apply database migrations
        run: >-
          npx --no-install supabase db push
          --linked
          --include-all
          --password "$SUPABASE_DB_PASSWORD"

      - name: Provision the matching database and Edge scheduler secrets
        shell: bash
        run: |
          command -v psql >/dev/null
          public_app_origin="$(node -e \
            'process.stdout.write(new URL(process.argv[1]).origin)' \
            "$PUBLIC_APP_URL")"
          test -n "$public_app_origin"
          psql "$SUPABASE_DB_URL" \
            --set=ON_ERROR_STOP=1 \
            --set=project_url="$VITE_SUPABASE_URL" \
            --set=processor_secret="$OUTBOX_PROCESSOR_SECRET" <<'SQL'
          select vault.create_secret(
            :'project_url',
            'sentient_project_url',
            'Sentient Campaign Manager Edge Function base URL'
          )
          where not exists (
            select 1 from vault.secrets where name = 'sentient_project_url'
          );
          select vault.update_secret(
            id,
            :'project_url',
            'sentient_project_url',
            'Sentient Campaign Manager Edge Function base URL'
          )
          from vault.secrets
          where name = 'sentient_project_url';
          select vault.create_secret(
            :'processor_secret',
            'sentient_outbox_processor_secret',
            'Sentient Campaign Manager outbox worker secret'
          )
          where not exists (
            select 1 from vault.secrets where name = 'sentient_outbox_processor_secret'
          );
          select vault.update_secret(
            id,
            :'processor_secret',
            'sentient_outbox_processor_secret',
            'Sentient Campaign Manager outbox worker secret'
          )
          from vault.secrets
          where name = 'sentient_outbox_processor_secret';
          SQL
          npx --no-install supabase secrets set \
            OUTBOX_PROCESSOR_SECRET="$OUTBOX_PROCESSOR_SECRET" \
            ADMIN_INVITE_REDIRECT_URL="$PUBLIC_APP_URL" \
            ALLOWED_ORIGINS="$public_app_origin" \
            --project-ref "$SUPABASE_PROJECT_ID"

      - name: Enforce hosted Auth access policy
        shell: bash
        run: |
          recovery_url="${PUBLIC_APP_URL}?auth=recovery"
          auth_config="$(curl --fail --silent --show-error --request PATCH \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/config/auth" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H 'Content-Type: application/json' \
            --data "$(jq -nc --arg site "$PUBLIC_APP_URL" --arg recovery "$recovery_url" \
              '{disable_signup:true,site_url:$site,uri_allow_list:($site + "," + $recovery)}')")"
          jq -e --arg site "$PUBLIC_APP_URL" --arg recovery "$recovery_url" '
            .disable_signup == true and
            .site_url == $site and
            (.uri_allow_list | split(",") | index($site) != null) and
            (.uri_allow_list | split(",") | index($recovery) != null)
          ' <<<"$auth_config"

      - name: Deploy Edge Functions
        run: >-
          npx --no-install supabase functions deploy
          --project-ref "$SUPABASE_PROJECT_ID"
          --use-api

      - name: Smoke-test deployed schema and Edge gateway
        shell: bash
        run: |
          openapi="$(curl --fail --silent --show-error --location \
            --retry 5 --retry-all-errors --retry-delay 3 --max-time 20 \
            "$VITE_SUPABASE_URL/rest/v1/" \
            -H "apikey: $VITE_SUPABASE_PUBLISHABLE_KEY")"
          grep -q 'get_promotion_allowed_actions' <<<"$openapi"
          function_status="$(curl --silent --show-error --output /tmp/function-response.json \
            --write-out '%{http_code}' --request POST \
            "$VITE_SUPABASE_URL/functions/v1/provider-webhook" \
            -H 'Content-Type: application/json' \
            -H 'x-provider: SMOKE' \
            --data '{}')"
          test "$function_status" = "401"
          outbox_status="$(curl --silent --show-error --output /tmp/outbox-response.json \
            --write-out '%{http_code}' --request POST \
            "$VITE_SUPABASE_URL/functions/v1/process-outbox" \
            -H 'Content-Type: application/json' \
            -H "x-internal-secret: $OUTBOX_PROCESSOR_SECRET" \
            --data '{"batchSize":1}')"
          test "$outbox_status" = "200"

      - name: Observe the deployed scheduler
        shell: bash
        run: |
          scheduler_health='{}'
          scheduler_check_started_epoch="$(date -u +%s)"
          for attempt in $(seq 1 18); do
            scheduler_health="$(curl --fail --silent --show-error --request POST \
              "$VITE_SUPABASE_URL/rest/v1/rpc/get_outbox_scheduler_health" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H 'Content-Type: application/json' \
              --data '{}')"
            if jq -e --argjson started "$scheduler_check_started_epoch" '
              .scheduled == true and
              .active == true and
              .projectUrlConfigured == true and
              .processorSecretConfigured == true and
              .lastRunStatus == "succeeded" and
              (.lastRunStartedEpoch // 0) >= $started
            ' <<<"$scheduler_health" >/dev/null; then
              break
            fi
            sleep 5
          done
          jq -e --argjson started "$scheduler_check_started_epoch" '
            .scheduled == true and
            .active == true and
            .projectUrlConfigured == true and
            .processorSecretConfigured == true and
            .lastRunStatus == "succeeded" and
            (.lastRunStartedEpoch // 0) >= $started
          ' <<<"$scheduler_health"

  build-pages:
    name: Build GitHub Pages artifact
    needs: deploy-supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: github-pages
    env:
      PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate public configuration
        shell: bash
        run: |
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY"
          test -n "$VITE_BASE_PATH"
          test -n "$PUBLIC_APP_URL"
          node <<'NODE'
          const publicUrl = new URL(process.env.PUBLIC_APP_URL);
          const normalizePath = (value) => {
            const trimmed = value.replace(/^\/+|\/+$/g, '');
            return trimmed ? `/${trimmed}/` : '/';
          };
          if (publicUrl.protocol !== 'https:' || publicUrl.search || publicUrl.hash) {
            throw new Error('PUBLIC_APP_URL must be a clean HTTPS URL.');
          }
          if (publicUrl.pathname !== normalizePath(process.env.VITE_BASE_PATH)) {
            throw new Error(
              `PUBLIC_APP_URL path ${publicUrl.pathname} does not match VITE_BASE_PATH ${normalizePath(process.env.VITE_BASE_PATH)}.`,
            );
          }
          NODE

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build production frontend
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    name: Deploy GitHub Pages
    needs: build-pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-test:
    name: Smoke-test published application
    needs: deploy-pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: github-pages
    env:
      EXPECTED_PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
      E2E_PRODUCTION: 'true'
      PRODUCTION_E2E_ACCOUNTS_JSON: ${{ secrets.PRODUCTION_E2E_ACCOUNTS_JSON }}
      PRODUCTION_SMOKE_URL: ${{ needs.deploy-pages.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies and browser
        run: npm ci && npx --no-install playwright install --with-deps chromium

      - name: Validate the deployed URL and controlled smoke account
        shell: bash
        run: |
          test -n "$EXPECTED_PUBLIC_APP_URL"
          test -n "$PRODUCTION_SMOKE_URL"
          test -n "$PRODUCTION_E2E_ACCOUNTS_JSON"
          node <<'NODE'
          const normalize = (value) => {
            const url = new URL(value);
            const trimmed = url.pathname.replace(/^\/+|\/+$/g, '');
            url.pathname = trimmed ? `/${trimmed}/` : '/';
            url.search = '';
            url.hash = '';
            return url.toString();
          };
          const expected = normalize(process.env.EXPECTED_PUBLIC_APP_URL);
          const deployed = normalize(process.env.PRODUCTION_SMOKE_URL);
          if (expected !== deployed) {
            throw new Error(`Pages deployed ${deployed}, but PUBLIC_APP_URL is ${expected}.`);
          }
          NODE

      - name: Exercise the published Auth boundary and protected data
        run: npm run test:smoke:production
