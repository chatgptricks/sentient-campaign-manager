name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
      VITE_DEMO_MODE: 'false'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify frontend
        run: npm run format:check && npm run lint && npm run typecheck && npm run test

  supabase:
    name: Deploy Supabase backend
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: github-pages
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      OUTBOX_PROCESSOR_SECRET: ${{ secrets.OUTBOX_PROCESSOR_SECRET }}
      PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Validate production configuration
        shell: bash
        run: |
          set -euo pipefail
          required=(
            SUPABASE_ACCESS_TOKEN
            SUPABASE_DB_PASSWORD
            SUPABASE_PROJECT_ID
            SUPABASE_DB_URL
            SUPABASE_SERVICE_ROLE_KEY
            SUPABASE_URL
            SUPABASE_PUBLISHABLE_KEY
            OUTBOX_PROCESSOR_SECRET
            PUBLIC_APP_URL
          )
          for key in "${required[@]}"; do
            test -n "${!key}" || { echo "$key is required"; exit 1; }
          done
          [[ "$PUBLIC_APP_URL" == */ ]] || { echo "PUBLIC_APP_URL must include a trailing slash"; exit 1; }

      - name: Link Supabase project
        run: npx --no-install supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        run: npx --no-install supabase db push --linked --include-all

      - name: Set Edge Function secrets
        run: |
          npx --no-install supabase secrets set \
            --project-ref "$SUPABASE_PROJECT_ID" \
            SUPABASE_URL="$SUPABASE_URL" \
            SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY" \
            SUPABASE_ANON_KEY="$SUPABASE_PUBLISHABLE_KEY" \
            OUTBOX_PROCESSOR_SECRET="$OUTBOX_PROCESSOR_SECRET" \
            SITE_URL="$PUBLIC_APP_URL" \
            ADMIN_INVITE_REDIRECT_URL="$PUBLIC_APP_URL"

      - name: Provision database Vault secrets
        shell: bash
        run: |
          set -euo pipefail
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 \
            -v project_url="$SUPABASE_URL" \
            -v outbox_secret="$OUTBOX_PROCESSOR_SECRET" <<'SQL'
          create extension if not exists supabase_vault with schema vault;

          delete from vault.secrets
          where name in ('sentient_project_url', 'sentient_outbox_processor_secret');

          select vault.create_secret(:'project_url', 'sentient_project_url');
          select vault.create_secret(:'outbox_secret', 'sentient_outbox_processor_secret');
          SQL

      - name: Deploy Edge Functions
        run: |
          npx --no-install supabase functions deploy admin-users --project-ref "$SUPABASE_PROJECT_ID"
          npx --no-install supabase functions deploy process-outbox --project-ref "$SUPABASE_PROJECT_ID"
          npx --no-install supabase functions deploy provider-webhook --project-ref "$SUPABASE_PROJECT_ID"
          npx --no-install supabase functions deploy send-notification --project-ref "$SUPABASE_PROJECT_ID"
          npx --no-install supabase functions deploy sync-invoice --project-ref "$SUPABASE_PROJECT_ID"
          npx --no-install supabase functions deploy test-integration --project-ref "$SUPABASE_PROJECT_ID"
          npx --no-install supabase functions deploy validate-resource --project-ref "$SUPABASE_PROJECT_ID"
          npx --no-install supabase functions deploy verify-publication --project-ref "$SUPABASE_PROJECT_ID"

      - name: Configure hosted Auth URLs
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body -X PATCH "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/config/auth" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg site_url "$PUBLIC_APP_URL" \
              '{site_url: $site_url, uri_allow_list: [$site_url], disable_signup: true}')"

  pages:
    name: Deploy GitHub Pages
    needs: supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
      VITE_DEMO_MODE: 'false'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build production frontend
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
