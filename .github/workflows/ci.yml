name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify application and backend
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      VITE_SUPABASE_URL: http://127.0.0.1:54321
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      VITE_BASE_PATH: /sentient-campaign-manager/
      E2E_REAL_BACKEND: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Start local Supabase
        run: npm run supabase:start

      - name: Load local Supabase public configuration
        shell: bash
        run: |
          local_status="$(npx --no-install supabase status -o json)"
          api_url="$(jq -r '.API_URL // .api_url // empty' <<<"$local_status")"
          publishable_key="$(jq -r '.PUBLISHABLE_KEY // .ANON_KEY // .publishable_key // empty' <<<"$local_status")"
          test -n "$api_url"
          test -n "$publishable_key"
          echo "VITE_SUPABASE_URL=$api_url" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=$publishable_key" >> "$GITHUB_ENV"

      - name: Rebuild local database
        run: npm run supabase:reset

      - name: Run database tests
        run: npm run test:db

      - name: Run Edge Function tests
        run: npm run test:functions

      - name: Build GitHub Pages bundle
        run: npm run build

      - name: Install Playwright browser
        run: npx --no-install playwright install --with-deps chromium

      - name: Run end-to-end tests
        env:
          VITE_E2E_SKIP_GOOGLE_SHEET_SYNC: 'true'
        run: npm run test:e2e

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14
